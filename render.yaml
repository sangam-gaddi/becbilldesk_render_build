services:
  - type: web
    name: bec-billdesk
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_COLLEGE_WALLET_ADDRESS
        sync: false
      - key: NEXT_PUBLIC_PAYMENT_AMOUNT_ETH
        value: "0.0001"
      - key: NEXT_PUBLIC_NETWORK_NAME
        value: Sepolia Testnet
      - key: NEXT_PUBLIC_CHAIN_ID
        value: "11155111"
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
